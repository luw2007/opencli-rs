site: trae-cn
name: chat
description: 向指定任务发送消息（可选择任务或新建任务）
domain: localhost
strategy: ui
browser: true

args:
  text:
    positional: true
    type: string
    required: true
    description: 要发送的文本内容
  task:
    type: string
    short: t
    default: ""
    description: 任务编号 (如 #1, #2) 或 "new" 创建新任务

columns: [Status, Action, Message]

pipeline:
  - evaluate: |
      (async () => {
        const text = ${{ args.text | json }};
        const taskArg = ${{ args.task | json }} || "";
        
        const results = [];
        
        const taskList = document.querySelector('.index-module__task-items-list___VBFD2, [class*="task-items-list"]');
        
        if (taskArg && taskArg !== "") {
          if (taskArg.toLowerCase() === "new") {
            const newBtn = taskList?.querySelector('button[class*="new-task"], button[class*="add-task"], [class*="create-task"]');
            if (newBtn) {
              newBtn.click();
              await new Promise(r => setTimeout(r, 800));
              results.push({ Status: 'Success', Action: '新建任务', Message: '已创建新任务' });
            } else {
              document.dispatchEvent(new KeyboardEvent('keydown', { 
                key: 'n', 
                code: 'KeyN', 
                metaKey: true, 
                bubbles: true 
              }));
              await new Promise(r => setTimeout(r, 800));
              results.push({ Status: 'Success', Action: '新建任务', Message: '已触发新建任务快捷键' });
            }
          } else {
            const taskIndex = parseInt(taskArg.replace('#', ''));
            if (!isNaN(taskIndex)) {
              const tasks = taskList?.querySelectorAll('.index-module__task-item___zOpfg, [class*="task-item"]');
              if (tasks && taskIndex >= 1 && taskIndex <= tasks.length) {
                const task = tasks[taskIndex - 1];
                const isSelected = task.classList.contains('selected') || 
                                  task.classList.contains('index-module__selected___VDArP');
                if (!isSelected) {
                  task.click();
                  await new Promise(r => setTimeout(r, 600));
                  results.push({ Status: 'Success', Action: '切换任务', Message: `已切换到任务 #${taskIndex}` });
                } else {
                  results.push({ Status: 'Info', Action: '切换任务', Message: `任务 #${taskIndex} 已是当前选中` });
                }
              } else {
                return [{ Status: 'Error', Action: '切换任务', Message: `任务索引超出范围或任务列表未找到` }];
              }
            }
          }
        }
        
        await new Promise(r => setTimeout(r, 300));
        
        const editor = document.querySelector('.chat-input-v2-input-box-editable, [data-lexical-editor="true"], [contenteditable="true"]');
        if (!editor) {
          return [...results, { Status: 'Error', Action: '输入文本', Message: '未找到输入框' }];
        }
        
        editor.focus();
        await new Promise(r => setTimeout(r, 100));
        
        document.execCommand('insertText', false, text);
        await new Promise(r => setTimeout(r, 200));
        
        results.push({ Status: 'Success', Action: '输入文本', Message: text.substring(0, 50) + (text.length > 50 ? '...' : '') });
        
        const sendBtn = document.querySelector('button[class*="send"], button[data-send="true"], [class*="submit-button"]');
        
        if (sendBtn && !sendBtn.disabled) {
          sendBtn.click();
          await new Promise(r => setTimeout(r, 500));
          results.push({ Status: 'Success', Action: '发送消息', Message: '已点击发送按钮' });
        } else {
          editor.dispatchEvent(new KeyboardEvent('keydown', { 
            key: 'Enter', 
            code: 'Enter', 
            keyCode: 13, 
            bubbles: true 
          }));
          await new Promise(r => setTimeout(r, 500));
          results.push({ Status: 'Success', Action: '发送消息', Message: '已按 Enter 发送' });
        }
        
        return results;
      })()
