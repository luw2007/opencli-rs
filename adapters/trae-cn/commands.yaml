site: trae-cn
name: commands
description: 获取当前可用的 /commands 和 @agents 列表（按项目隔离，从 React Fiber 直接提取）
domain: localhost
strategy: ui
browser: true

args:
  kind:
    type: string
    default: ""
    description: 按类型筛选 (slash/agent)，留空则全部显示
  source:
    type: string
    default: ""
    description: 按来源筛选 (builtin/commands/skills/custom)，留空则全部显示
  project:
    type: string
    default: ""
    description: 按项目路径或名称筛选，留空则显示全部项目

columns: [Project, Type, Name, Description, Source]

pipeline:
  - evaluate: |
      (function(){
        var typeFilter = (${{ args.kind | json }} || '').toLowerCase();
        var sourceFilter = (${{ args.source | json }} || '').toLowerCase();
        var projectFilter = (${{ args.project | json }} || '').toLowerCase();
        var locs = document.querySelectorAll('.chat-input-v2-mention-popup-locator');
        var all = [];

        var defaultProject = '';
        var titleMatch = document.title.match(/\u2014\s*(.+)$/);
        if (titleMatch) defaultProject = titleMatch[1].trim();
        if (!defaultProject) defaultProject = document.title.replace(/ - .*$/, '').trim() || 'unknown';

        locs.forEach(function(loc) {
          var fk = Object.keys(loc).find(function(k) { return k.startsWith('__reactFiber'); });
          if (!fk) return;
          var cur = loc[fk];
          var sessionRootPath = '';
          var cmds = null;
          var agents = null;

          for (var d = 0; d < 25 && cur; d++) {
            var p = cur.memoizedProps || {};
            if (p.externalCommands && !cmds) cmds = p.externalCommands;
            if (p.subAgentList && !agents) agents = p.subAgentList;
            if (p.mentionProvider && p.mentionProvider.sessionRootPath && !sessionRootPath) {
              sessionRootPath = p.mentionProvider.sessionRootPath;
            }
            if (p.sessionRootPath && !sessionRootPath) sessionRootPath = p.sessionRootPath;
            cur = cur.return;
          }

          var project = sessionRootPath || defaultProject;
          var projectName = project.split('/').filter(Boolean).pop() || project;

          if (projectFilter && project.toLowerCase().indexOf(projectFilter) === -1 && projectName.toLowerCase().indexOf(projectFilter) === -1) return;

          if (cmds) {
            cmds.forEach(function(cmd) {
              all.push({
                Project: projectName,
                Type: 'slash',
                Name: cmd.name || '',
                Description: (cmd.desc || '').substring(0, 120),
                Source: cmd.source || ''
              });
            });
          }

          if (agents) {
            agents.forEach(function(a) {
              all.push({
                Project: projectName,
                Type: a.type || 'agent',
                Name: a.name || '',
                Description: (a.description || '').substring(0, 120),
                Source: a.unique_name || ''
              });
            });
          }
        });

        if (typeFilter) {
          if (typeFilter === 'slash') {
            all = all.filter(function(r) { return r.Type === 'slash'; });
          } else if (typeFilter === 'agent') {
            all = all.filter(function(r) { return r.Type !== 'slash'; });
          } else {
            all = all.filter(function(r) {
              return r.Type.toLowerCase().indexOf(typeFilter) >= 0;
            });
          }
        }
        if (sourceFilter) {
          all = all.filter(function(r) {
            return r.Source.toLowerCase().indexOf(sourceFilter) >= 0;
          });
        }

        if (all.length === 0) {
          return [{ Project: '-', Type: '-', Name: '-', Description: '未检测到可用命令', Source: '-' }];
        }

        var seen = {};
        all = all.filter(function(r) {
          var key = r.Project + '|' + r.Type + '|' + r.Name + '|' + r.Source;
          if (seen[key]) return false;
          seen[key] = true;
          return true;
        });

        return all;
      })()
