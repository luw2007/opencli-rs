site: trae-cn
name: status
description: 检查与 Trae IDE 的 CDP 连接状态
domain: localhost
strategy: ui
browser: true

columns: [Status, Url, Title]

pipeline:
  - evaluate: |
      (function() {
        return [{
          Status: 'Connected',
          Url: window.location.href,
          Title: document.title,
        }];
      })()
