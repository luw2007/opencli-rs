site: trae-cn
name: read
description: 读取当前 Trae 对话历史
domain: localhost
strategy: ui
browser: true

columns: [Role, Text]

pipeline:
  - evaluate: |
      (function() {
        const messages = Array.from(document.querySelectorAll('[data-message-role], .message, [class*="message"]'));

        if (messages.length === 0) {
          return [{ Role: 'System', Text: '未找到对话历史' }];
        }

        return messages.map(msg => {
          const role = msg.getAttribute('data-message-role') || 
                       (msg.classList.contains('user') || msg.classList.contains('human') ? 'human' : 'assistant');
          let text = '';
          const content = msg.querySelector('.markdown, .content, [class*="content"]');
          if (content) {
            text = content.innerText || content.textContent;
          } else {
            text = msg.innerText || msg.textContent;
          }
          return {
            Role: role === 'human' ? 'User' : 'Assistant',
            Text: text.trim()
          };
        });
      })()
