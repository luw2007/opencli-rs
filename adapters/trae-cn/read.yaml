site: trae-cn
name: read
description: 读取当前 Trae 对话历史（结构化拆分）
domain: localhost
strategy: ui
browser: true

columns: [Role, Type, Text]

pipeline:
  - evaluate: |
      (function() {
        var container = document.querySelector('#mc-agent-content-container');
        if (!container) {
          return [{ Role: 'Error', Type: 'error', Text: '未找到对话容器 (#mc-agent-content-container)' }];
        }

        var turns = container.querySelectorAll('section.chat-turn[data-role]');
        if (turns.length === 0) {
          return [{ Role: 'System', Type: 'info', Text: '暂无对话内容' }];
        }

        function getText(el) {
          return (el.innerText || el.textContent || '').trim();
        }

        function classifyTask(el) {
          var hasTool = el.querySelector('.ai-agent-task-tool');
          var mdEl = el.querySelector('.chat-markdown');
          var runCmd = el.querySelector('.icd-run-command-card-v2');
          var search = el.querySelector('.icd-search-workspace-card');
          var fileView = el.querySelector('.icd-file-view');
          var editEl = el.querySelector('[class*="code-edit"], [class*="diff"]');

          if (runCmd) return 'run-command';
          if (search) return 'search';
          if (fileView && (mdEl || editEl)) return 'edit-file';
          if (fileView) return 'read-file';
          if (mdEl && !hasTool) return 'text';
          if (mdEl && hasTool) return 'text+tool';
          return 'tool';
        }

        function classifyChunk(el) {
          var section = el.querySelector('.ai-agent-task-section');
          if (!section) return 'chunk';
          var cls = section.className || '';
          if (cls.indexOf('todo') >= 0) return 'todo';
          if (cls.indexOf('thinking') >= 0) return 'thinking';
          return 'section';
        }

        function extractToolDetail(el, type) {
          if (type === 'search') {
            var card = el.querySelector('.icd-search-workspace-card');
            return card ? getText(card) : '';
          }
          if (type === 'read-file' || type === 'edit-file') {
            var fv = el.querySelector('.icd-file-view');
            var label = fv ? fv.querySelector('.monaco-highlighted-label, [class*="file-name"], [class*="filename"]') : null;
            return label ? getText(label) : (fv ? getText(fv) : '');
          }
          if (type === 'run-command') {
            var cmd = el.querySelector('.icd-run-command-card-v2');
            return cmd ? getText(cmd) : '';
          }
          return '';
        }

        function parseAssistant(contentEl, field) {
          var items = contentEl.querySelectorAll(':scope .ai-agent-task, :scope .ai-agent-task-chunk');
          if (items.length === 0) {
            var obj = { Role: 'Assistant', Type: 'text' };
            obj[field] = getText(contentEl);
            return [obj];
          }

          var rows = [];
          for (var i = 0; i < items.length; i++) {
            var item = items[i];
            var isChunk = item.classList.contains('ai-agent-task-chunk');
            var type, content;

            if (isChunk) {
              type = classifyChunk(item);
              content = getText(item);
            } else {
              type = classifyTask(item);
              var mdEl = item.querySelector('.chat-markdown');
              if (type === 'text' || type === 'text+tool') {
                content = mdEl ? getText(mdEl) : getText(item);
              } else {
                var mdText = mdEl ? getText(mdEl) : '';
                var toolText = extractToolDetail(item, type);
                content = mdText ? mdText + '\n' + toolText : toolText;
              }
            }

            if (content.length > 10000) {
              content = content.substring(0, 10000) + '... (truncated)';
            }

            var obj = { Role: 'Assistant', Type: type };
            obj[field] = content || '(empty)';
            rows.push(obj);
          }
          return rows;
        }

        var results = [];
        turns.forEach(function(turn) {
          var role = turn.getAttribute('data-role');
          if (role === 'user') {
            var userEl = turn.querySelector('.icube-value');
            var text = userEl ? getText(userEl) : '';
            results.push({ Role: 'User', Type: 'message', Text: text || '(empty)' });
          } else {
            var assistEl = turn.querySelector('.assistant-chat-turn-content');
            if (assistEl) {
              var rows = parseAssistant(assistEl, 'Text');
              for (var j = 0; j < rows.length; j++) {
                results.push(rows[j]);
              }
            } else {
              results.push({ Role: 'Assistant', Type: 'text', Text: '(empty)' });
            }
          }
        });

        return results;
      })()
