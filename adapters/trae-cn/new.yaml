site: trae-cn
name: new
description: 创建新的 Trae 会话
domain: localhost
strategy: ui
browser: true

columns: [Status]

pipeline:
  - evaluate: |
      (async () => {
        document.dispatchEvent(new KeyboardEvent('keydown', { key: 'n', code: 'KeyN', metaKey: true, bubbles: true }));
        await new Promise(r => setTimeout(r, 1000));
        return [{ Status: 'Success' }];
      })()
