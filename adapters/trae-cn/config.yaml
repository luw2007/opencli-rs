site: trae-cn
name: config
description: 获取用户配置信息（模型、上下文、Beta等）
domain: localhost
strategy: ui
browser: true

args:
  section:
    positional: true
    type: string
    description: "配置部分：model, context, rules, user, all（默认）"
    default: "all"

columns: [Section, Key, Value]

pipeline:
  - evaluate: |
      (function() {
        var section = ${{ args.section | json }};
        var results = [];

        if (section === 'all' || section === 'model') {
          var modelBtn = document.querySelector('[class*="model-selector"], [class*="model-switch"], [class*="model-name"]');
          var modelText = modelBtn ? modelBtn.innerText.trim() : null;
          if (!modelText) {
            var modelEl = document.querySelector('.chat-turn-heading.assistant .model-name, [class*="model"]');
            modelText = modelEl ? modelEl.innerText.trim() : null;
          }
          results.push({ Section: '模型', Key: '当前模型', Value: modelText || '未检测到' });
        }

        if (section === 'all' || section === 'context') {
          var fileRefs = document.querySelectorAll('.file-reference-item, [class*="file-ref"], [class*="reference-file"]');
          var codeRefs = document.querySelectorAll('[class*="code-reference"]');
          results.push({ Section: '上下文', Key: '文件引用', Value: fileRefs.length + ' 个' });
          results.push({ Section: '上下文', Key: '代码引用', Value: codeRefs.length + ' 个' });

          if (fileRefs.length > 0) {
            var files = [];
            fileRefs.forEach(function(el) {
              var label = el.querySelector('.monaco-highlighted-label, [class*="label"]');
              if (label) files.push(label.textContent.trim());
            });
            if (files.length > 0) {
              results.push({ Section: '上下文', Key: '引用文件列表', Value: files.slice(0, 10).join(', ') });
            }
          }
        }

        if (section === 'all' || section === 'rules') {
          var ruleContainer = document.querySelector('[class*="rule-meta"], [class*="rules"]');
          results.push({ Section: '规则', Key: '规则容器', Value: ruleContainer ? '已加载' : '未检测到' });

          var skillEls = document.querySelectorAll('[class*="skill"]');
          results.push({ Section: '技能', Key: '技能元素', Value: skillEls.length + ' 个' });
        }

        if (section === 'all' || section === 'user') {
          var title = document.title || '';
          results.push({ Section: '用户', Key: '窗口标题', Value: title });

          var avatar = document.querySelector('.icd-avatar-img img');
          var avatarSrc = avatar ? avatar.getAttribute('src') : null;
          if (avatarSrc) {
            results.push({ Section: '用户', Key: '头像', Value: avatarSrc.substring(0, 80) + '...' });
          }
        }

        if (results.length === 0) {
          results.push({ Section: section, Key: 'Status', Value: '未找到配置信息' });
        }

        return results;
      })()
