site: trae-cn
name: task-ask
description: 检查指定任务是否处于问询状态，查看选项，支持选择并提交
domain: localhost
strategy: ui
browser: true
timeout_seconds: 30

args:
  index:
    positional: true
    type: string
    default: "0"
    description: 任务索引（从 1 开始，0 表示当前选中的任务）或 sessionId
  session:
    type: string
    default: ""
    description: 指定 sessionId（优先于 index）
  select:
    long: select
    type: int
    default: 0
    description: 选择指定选项编号（从 1 开始），有值时自动提交
  text:
    long: text
    type: string
    default: ""
    description: 为选中的选项输入文本内容（配合 --select 使用）

columns: [Index, Type, Step, Label, Description, Selected]

pipeline:
  - evaluate: |
      (async () => {
        var sessionArg = ${{ args.session | json }} || "";
        var indexRaw = ${{ args.index | json }} || "0";
        var selectId = ${{ args.select }} || 0;
        var inputText = ${{ args.text | json }} || "";

        function cls(el) {
          var c = el.className;
          return (typeof c === 'string') ? c : (c && c.baseVal ? c.baseVal : '');
        }

        function getSessionId(el) {
          var fk = Object.keys(el).find(function(k) { return k.startsWith('__reactFiber$'); });
          if (!fk) return '';
          var cur = el[fk];
          for (var n = 0; n < 5 && cur; n++) {
            var p = cur.memoizedProps || {};
            if (p.session && p.session.sessionId) return p.session.sessionId;
            cur = cur.return;
          }
          return '';
        }

        var resolvedIndex = 0;
        var taskList = document.querySelector('[class*="task-items-list"]');

        if (sessionArg) {
          if (!taskList) return [{ Index: '-', Type: 'Error', Step: '', Label: '未找到任务列表', Description: '', Selected: '' }];
          var tasks = taskList.querySelectorAll(':scope > [class*="task-item"]');
          var found = false;
          for (var si = 0; si < tasks.length; si++) {
            if (getSessionId(tasks[si]) === sessionArg) {
              resolvedIndex = si + 1;
              found = true;
              break;
            }
          }
          if (!found) return [{ Index: '-', Type: 'Error', Step: '', Label: '未找到 sessionId: ' + sessionArg, Description: '', Selected: '' }];
        } else {
          var parsed = parseInt(indexRaw);
          var isNumeric = !isNaN(parsed) && /^\d+$/.test(indexRaw);
          if (isNumeric) {
            resolvedIndex = parsed;
          } else if (indexRaw && indexRaw !== "0") {
            if (!taskList) return [{ Index: '-', Type: 'Error', Step: '', Label: '未找到任务列表', Description: '', Selected: '' }];
            var tasks2 = taskList.querySelectorAll(':scope > [class*="task-item"]');
            var found2 = false;
            for (var si2 = 0; si2 < tasks2.length; si2++) {
              if (getSessionId(tasks2[si2]) === indexRaw) {
                resolvedIndex = si2 + 1;
                found2 = true;
                break;
              }
            }
            if (!found2) return [{ Index: '-', Type: 'Error', Step: '', Label: '未找到 sessionId: ' + indexRaw, Description: '', Selected: '' }];
          }
        }

        var taskIndex = resolvedIndex;

        if (taskIndex > 0) {
          if (!taskList) taskList = document.querySelector('[class*="task-items-list"]');
          if (!taskList) return [{ Index: '-', Type: 'Error', Step: '', Label: '未找到任务列表', Description: '', Selected: '' }];
          var tasksAll = taskList.querySelectorAll(':scope > [class*="task-item"]');
          if (taskIndex < 1 || taskIndex > tasksAll.length) {
            return [{ Index: '-', Type: 'Error', Step: '', Label: '任务索引超出范围 (1-' + tasksAll.length + ')', Description: '', Selected: '' }];
          }
          var task = tasksAll[taskIndex - 1];
          if (cls(task).indexOf('selected') < 0) {
            task.click();
            await new Promise(function(r) { setTimeout(r, 1000); });
          }
        }

        var container = document.querySelector('#mc-agent-content-container');
        if (!container) return [{ Index: '-', Type: 'Error', Step: '', Label: '未找到对话容器', Description: '', Selected: '' }];

        var cards = container.querySelectorAll('[class*="ask-user-question-card-container"]');
        if (cards.length === 0) return [{ Index: '-', Type: 'Info', Step: '', Label: '当前任务没有问询', Description: '', Selected: '' }];

        var activeCard = null;
        for (var i = cards.length - 1; i >= 0; i--) {
          if (cls(cards[i]).indexOf('status-completed') < 0) {
            activeCard = cards[i];
            break;
          }
        }

        if (!activeCard) return [{ Index: '-', Type: 'Info', Step: '', Label: '所有问询已完成', Description: '', Selected: '' }];

        if (cls(activeCard).indexOf('collapsed') >= 0) {
          activeCard.click();
          await new Promise(function(r) { setTimeout(r, 500); });
        }

        var headerEl = activeCard.querySelector('[class*="ask-user-question-content-header"], [class*="question-header"], [class*="question-title"]');
        if (!headerEl) {
          var textEls = activeCard.querySelectorAll('div, span, p');
          for (var t = 0; t < textEls.length; t++) {
            var txt = textEls[t].textContent.trim();
            if (txt.length > 10 && txt.indexOf('?') >= 0) { headerEl = textEls[t]; break; }
          }
        }
        var questionText = headerEl ? headerEl.textContent.trim() : '';

        var stepInfo = '';
        var footerEl = activeCard.querySelector('[class*="footer"], [class*="step-indicator"], [class*="progress"]');
        if (footerEl) {
          var footerText = footerEl.textContent.trim();
          var stepMatch = footerText.match(/(\d+)\s*\/\s*(\d+)/);
          if (stepMatch) {
            var extra = footerText.replace(stepMatch[0], '').replace(/[─—\-\s]+/g, ' ').trim();
            stepInfo = stepMatch[1] + '/' + stepMatch[2] + (extra ? ' ' + extra : '');
          }
        }
        if (!stepInfo) {
          var allCards = container.querySelectorAll('[class*="ask-user-question-card-container"]');
          var total = allCards.length;
          var completedCount = 0;
          for (var ci = 0; ci < allCards.length; ci++) {
            if (cls(allCards[ci]).indexOf('status-completed') >= 0) completedCount++;
          }
          if (total > 1) {
            stepInfo = (completedCount + 1) + '/' + total;
          }
        }

        var optionsSection = activeCard.querySelector('[class*="options-section"], [class*="options-container"]');
        var results = [];

        if (questionText) {
          results.push({ Index: 'Q', Type: 'Question', Step: stepInfo, Label: questionText.substring(0, 200), Description: '', Selected: '' });
        }

        if (!optionsSection) {
          var allText = activeCard.textContent.trim();
          if (!questionText && allText) {
            results.push({ Index: 'Q', Type: 'Question', Step: stepInfo, Label: allText.substring(0, 200), Description: '', Selected: '' });
          }
          if (results.length === 0) {
            results.push({ Index: '-', Type: 'Info', Step: '', Label: '问询中但未找到选项区域', Description: '', Selected: '' });
          }
          return results;
        }

        var optionItems = optionsSection.querySelectorAll('[class*="option-item"], [class*="option-card"]');
        if (optionItems.length <= 1) {
          var deeper = optionsSection.querySelectorAll('[class*="option"][class*="item"], [class*="option"][class*="card"]');
          if (deeper.length > optionItems.length) optionItems = deeper;
        }
        if (optionItems.length <= 1) {
          var byRole = optionsSection.querySelectorAll('[role="option"], [role="radio"], [role="listitem"]');
          if (byRole.length > optionItems.length) optionItems = byRole;
        }
        if (optionItems.length <= 1) {
          var wrapper = optionsSection.children.length === 1 ? optionsSection.children[0] : optionsSection;
          optionItems = wrapper.children;
        }

        var optionsList = [];
        for (var j = 0; j < optionItems.length; j++) {
          var item = optionItems[j];
          var itemCls = cls(item);

          var labelEl = item.querySelector('[class*="option-label"], [class*="option-title"]');
          var descEl = item.querySelector('[class*="option-desc"], [class*="option-detail"]');
          var label = '';
          if (labelEl) label = labelEl.textContent.trim();
          if (!label) {
            var textNodes = item.querySelectorAll('[class*="label"], [class*="title"], [class*="header"]');
            for (var tn = 0; tn < textNodes.length; tn++) {
              var tc = cls(textNodes[tn]);
              if (tc.indexOf('radio') >= 0 || tc.indexOf('icon') >= 0 || tc.indexOf('svg') >= 0) continue;
              var t = textNodes[tn].textContent.trim();
              if (t.length > 0) { label = t; break; }
            }
          }
          if (!label) label = item.textContent.trim();
          if (label.length > 300) label = label.substring(0, 300);
          var desc = descEl ? descEl.textContent.trim() : '';
          if (!desc) {
            var descNodes = item.querySelectorAll('[class*="description"], [class*="desc"], [class*="detail"]');
            for (var dn = 0; dn < descNodes.length; dn++) {
              var d = descNodes[dn].textContent.trim();
              if (d.length > 0 && d !== label) { desc = d; break; }
            }
          }
          if (desc && (label === desc || label.indexOf(desc) === 0)) desc = '';
          if (desc && label.indexOf(desc) >= 0) {
            label = label.replace(desc, '').trim();
          }

          var isChecked = itemCls.indexOf('selected') >= 0 ||
                          itemCls.indexOf('checked') >= 0 ||
                          itemCls.indexOf('active') >= 0;
          var radio = item.querySelector('input[type="radio"], input[type="checkbox"]');
          if (radio && radio.checked) isChecked = true;
          var radioIcon = item.querySelector('[class*="radio"][class*="checked"], [class*="check"][class*="active"]');
          if (radioIcon) isChecked = true;

          var hasInput = item.querySelector('input[type="text"], textarea, [contenteditable="true"]');
          var isOther = /^(其他|Other)$/i.test(label.replace(/\s+/g, ''));
          var effectiveHasInput = !!hasInput || isOther;

          optionsList.push({
            index: j + 1,
            label: label.substring(0, 300),
            desc: desc.substring(0, 300),
            checked: isChecked,
            hasInput: effectiveHasInput,
            isOther: isOther,
            element: item,
            inputElement: hasInput
          });

          results.push({
            Index: String(j + 1),
            Type: effectiveHasInput ? 'Option+Input' : 'Option',
            Step: '',
            Label: label.substring(0, 300),
            Description: desc.substring(0, 300),
            Selected: isChecked ? '✓' : ''
          });
        }

        if (selectId > 0 && selectId <= optionsList.length) {
          var target = optionsList[selectId - 1];
          var clickTarget = target.element.querySelector('input[type="radio"], input[type="checkbox"]')
                         || target.element.querySelector('[class*="radio"], [class*="checkbox"]')
                         || target.element;
          clickTarget.click();
          await new Promise(function(r) { setTimeout(r, 300); });
          target.element.click();
          await new Promise(function(r) { setTimeout(r, 500); });

          var findInput = function() {
            var sel = 'input[type="text"], textarea, [contenteditable="true"]';
            return target.element.querySelector(sel)
              || activeCard.querySelector(sel + '[class*="input"], ' + sel + '[class*="other"]')
              || activeCard.querySelector(sel);
          };

          if (inputText || target.isOther) {
            var inp = findInput();
            if (!inp) {
              for (var retryInp = 0; retryInp < 8; retryInp++) {
                await new Promise(function(r) { setTimeout(r, 400); });
                inp = findInput();
                if (inp) break;
              }
            }
            if (inp && inputText) {
              inp.focus();
              await new Promise(function(r) { setTimeout(r, 200); });
              if (inp.tagName === 'INPUT' || inp.tagName === 'TEXTAREA') {
                inp.focus();
                inp.select();
                document.execCommand('insertText', false, inputText);
                inp.dispatchEvent(new Event('input', { bubbles: true }));
                inp.dispatchEvent(new Event('change', { bubbles: true }));
              } else {
                var s = window.getSelection();
                s.selectAllChildren(inp);
                document.execCommand('delete', false, null);
                document.execCommand('insertText', false, inputText);
              }
              await new Promise(function(r) { setTimeout(r, 300); });
            } else if (target.isOther && !inputText) {
              results = [{ Index: String(selectId), Type: 'Input', Step: stepInfo, Label: target.label, Description: inp ? '输入框已就绪，请使用 --text 提供内容' : '未检测到输入框', Selected: '✓' }];
              return results;
            }
          }

          var submitBtn = activeCard.querySelector('[class*="submit"], [class*="confirm"], button[class*="primary"]');
          if (!submitBtn) {
            var footerArea = activeCard.querySelector('[class*="footer"], [class*="action"]');
            var searchArea = footerArea || activeCard;
            var allBtns = searchArea.querySelectorAll('button, [role="button"]');
            for (var b = 0; b < allBtns.length; b++) {
              var btnText = allBtns[b].textContent.trim();
              if (btnText === '提交' || btnText === '确认' || btnText === 'Submit' || btnText === 'Confirm') {
                submitBtn = allBtns[b];
                break;
              }
            }
          }
          if (!submitBtn) {
            var allBtns2 = activeCard.querySelectorAll('button, [role="button"]');
            for (var b2 = 0; b2 < allBtns2.length; b2++) {
              var btnText2 = allBtns2[b2].textContent.trim();
              if (btnText2 === '下一个' || btnText2 === 'Next') {
                submitBtn = allBtns2[b2];
                break;
              }
            }
          }

          if (submitBtn) {
            submitBtn.click();
            await new Promise(function(r) { setTimeout(r, 500); });
            results = [{ Index: String(selectId), Type: 'Submitted', Step: stepInfo, Label: target.label, Description: inputText || '', Selected: '✓' }];
          } else {
            for (var r2 = 0; r2 < results.length; r2++) {
              results[r2].Selected = (results[r2].Index === String(selectId)) ? '✓ (已选)' : '';
            }
            results.push({ Index: '-', Type: 'Warning', Step: '', Label: '已选择选项但未找到提交按钮', Description: '', Selected: '' });
          }
        }

        return results;
      })()
