site: trae-cn
name: ask
description: 发送提示并等待 AI 回复（send + wait + read）
domain: localhost
strategy: ui
browser: true

args:
  text:
    positional: true
    type: string
    required: true
    description: 要发送的提示内容
  timeout:
    type: int
    default: 30
    description: 等待回复的最大秒数

columns: [Role, Text]

pipeline:
  - evaluate: |
      (async () => {
        const text = ${{ args.text | json }};
        const timeout = ${{ args.timeout }} || 30;

        const beforeCount = document.querySelectorAll('[data-message-role], .message, [class*="message"]').length;

        let editor = document.querySelector('.chat-input-v2-input-box-editable, [data-lexical-editor="true"], [contenteditable="true"]');
        if (!editor) return [{ Role: 'System', Text: '未找到输入元素' }];
        editor.focus();
        document.execCommand('insertText', false, text);
        await new Promise(r => setTimeout(r, 500));

        editor.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter', code: 'Enter', keyCode: 13, bubbles: true }));

        const pollInterval = 2;
        const maxPolls = Math.ceil(timeout / pollInterval);
        let response = '';

        for (let i = 0; i < maxPolls; i++) {
          await new Promise(r => setTimeout(r, pollInterval * 1000));

          const msgs = document.querySelectorAll('[data-message-role], .message, [class*="message"]');
          if (msgs.length <= beforeCount) continue;

          const lastMsg = msgs[msgs.length - 1];
          const role = lastMsg.getAttribute('data-message-role') || 
                       (lastMsg.classList.contains('user') || lastMsg.classList.contains('human') ? 'human' : 'assistant');
          if (role === 'human') continue;

          const content = lastMsg.querySelector('.markdown, .content, [class*="content"]');
          const t = content ? content.innerText : lastMsg.innerText;
          if (t && t.trim()) { response = t.trim(); break; }
        }

        if (!response) {
          return [
            { Role: 'User', Text: text },
            { Role: 'System', Text: `在 ${timeout} 秒内未收到回复。AI 可能仍在生成中。` },
          ];
        }

        return [
          { Role: 'User', Text: text },
          { Role: 'Assistant', Text: response },
        ];
      })()
