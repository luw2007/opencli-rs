site: trae-cn
name: task-info-watch
description: 持续监控任务对话内容（动态刷新）
domain: localhost
strategy: ui
browser: true

args:
  index:
    positional: true
    type: string
    default: "1"
    description: 任务索引（从 1 开始）或 sessionId
  session:
    type: string
    default: ""
    description: 指定 sessionId（优先于 index）
  interval:
    long: interval
    type: int
    default: 2
    description: 刷新间隔（秒）
  count:
    long: count
    type: int
    default: 10
    description: 刷新次数（0 表示无限）

columns: [Time, Role, Content]

pipeline:
  - evaluate: |
      (async () => {
        var sessionArg = ${{ args.session | json }} || "";
        var indexRaw = ${{ args.index | json }} || "1";
        const interval = ${{ args.interval }} || 2;
        const maxCount = ${{ args.count }} || 10;

        function getSessionId(el) {
          var fk = Object.keys(el).find(function(k) { return k.startsWith('__reactFiber$'); });
          if (!fk) return '';
          var cur = el[fk];
          for (var n = 0; n < 5 && cur; n++) {
            var p = cur.memoizedProps || {};
            if (p.session && p.session.sessionId) return p.session.sessionId;
            cur = cur.return;
          }
          return '';
        }

        const taskList = document.querySelector('[class*="task-items-list"]');

        if (!taskList) {
          return [{ Time: '-', Role: 'Error', Content: '未找到任务列表' }];
        }

        const tasks = taskList.querySelectorAll(':scope > [class*="task-item"]');

        if (tasks.length === 0) {
          return [{ Time: '-', Role: 'Error', Content: '暂无任务' }];
        }

        var index = 0;
        if (sessionArg) {
          for (var si = 0; si < tasks.length; si++) {
            if (getSessionId(tasks[si]) === sessionArg) { index = si + 1; break; }
          }
          if (!index) return [{ Time: '-', Role: 'Error', Content: '未找到 sessionId: ' + sessionArg }];
        } else {
          var parsed = parseInt(indexRaw);
          var isNumeric = !isNaN(parsed) && /^\d+$/.test(indexRaw);
          if (isNumeric) {
            index = parsed;
          } else {
            for (var si2 = 0; si2 < tasks.length; si2++) {
              if (getSessionId(tasks[si2]) === indexRaw) { index = si2 + 1; break; }
            }
            if (!index) return [{ Time: '-', Role: 'Error', Content: '未找到 sessionId: ' + indexRaw }];
          }
        }

        if (index < 1 || index > tasks.length) {
          return [{ Time: '-', Role: 'Error', Content: '任务索引超出范围 (1-' + tasks.length + ')' }];
        }

        const task = tasks[index - 1];
        const isSelected = task.className.indexOf('selected') >= 0;

        if (!isSelected) {
          task.click();
          await new Promise(r => setTimeout(r, 800));
        }

        const chatContainer = document.querySelector('#mc-agent-content-container');

        if (!chatContainer) {
          return [{ Time: '-', Role: 'Error', Content: '未找到对话内容容器' }];
        }

        const results = [];
        const timestamp = new Date().toLocaleTimeString();

        const turns = chatContainer.querySelectorAll('section.chat-turn[data-role]');

        if (turns.length === 0) {
          const text = chatContainer.innerText || chatContainer.textContent;
          results.push({ Time: timestamp, Role: 'Content', Content: text.trim() || '容器内容为空' });
        } else {
          turns.forEach(turn => {
            const role = turn.getAttribute('data-role');
            let text = '';
            if (role === 'user') {
              const el = turn.querySelector('.icube-value');
              text = el ? el.innerText : turn.innerText;
            } else {
              const el = turn.querySelector('.assistant-chat-turn-content');
              text = el ? el.innerText : turn.innerText;
            }
            results.push({
              Time: timestamp,
              Role: role === 'user' ? 'User' : 'Assistant',
              Content: text.trim()
            });
          });
        }

        return results.length > 0 ? results : [{ Time: timestamp, Role: 'Info', Content: '未找到对话内容' }];
      })()
