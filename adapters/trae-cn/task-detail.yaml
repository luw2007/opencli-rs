site: trae-cn
name: task-detail
description: 查看任务详情
domain: localhost
strategy: ui
browser: true

args:
  index:
    positional: true
    type: int
    default: 1
    description: 任务索引（从 1 开始）

columns: [Field, Value]

pipeline:
  - evaluate: |
      (function() {
        const index = ${{ args.index }} || 1;
        const taskList = document.querySelector('.index-module__task-items-list___VBFD2, [class*="task-items-list"]');
        
        if (!taskList) {
          return [{ Field: 'Error', Value: '未找到任务列表' }];
        }
        
        const tasks = taskList.querySelectorAll('.index-module__task-item___zOpfg, [class*="task-item"]');
        
        if (tasks.length === 0) {
          return [{ Field: 'Error', Value: '暂无任务' }];
        }
        
        if (index < 1 || index > tasks.length) {
          return [{ Field: 'Error', Value: `任务索引超出范围 (1-${tasks.length})` }];
        }
        
        const task = tasks[index - 1];
        const results = [];
        
        // 基本信息
        results.push({ Field: 'Index', Value: index.toString() });
        results.push({ Field: 'Status', Value: task.classList.contains('selected') ? '进行中' : '已完成' });
        
        // 所有文本内容
        const fullText = task.textContent.trim();
        results.push({ Field: 'Full Text', Value: fullText });
        
        // 类名
        results.push({ Field: 'Classes', Value: task.className });
        
        // 子元素数量
        results.push({ Field: 'Children', Value: task.children.length.toString() });
        
        // HTML 结构（前 500 字符）
        results.push({ Field: 'HTML', Value: task.innerHTML.substring(0, 500) });
        
        return results;
      })()
