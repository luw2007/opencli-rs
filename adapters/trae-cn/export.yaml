site: trae-cn
name: export
description: 将当前 Trae 会话导出为 Markdown 文件
domain: localhost
strategy: ui
browser: true

args:
  output:
    type: string
    description: "输出文件路径（默认: /tmp/trae-export.md）"

columns: [Status, File]

pipeline:
  - evaluate: |
      (function() {
        const messages = Array.from(document.querySelectorAll('[data-message-role], .message, [class*="message"]'));
        const output = ${{ args.output }} || '/tmp/trae-export.md';

        let markdown = '# Trae 会话导出\n\n';
        markdown += `导出时间: ${new Date().toLocaleString('zh-CN')}\n\n---\n\n`;

        messages.forEach(msg => {
          const role = msg.getAttribute('data-message-role') || 
                       (msg.classList.contains('user') || msg.classList.contains('human') ? 'human' : 'assistant');
          const content = msg.querySelector('.markdown, .content, [class*="content"]');
          const text = content ? content.innerText : msg.innerText;
          
          const roleLabel = role === 'human' ? '👤 用户' : '🤖 助手';
          markdown += `### ${roleLabel}\n\n${text.trim()}\n\n---\n\n`;
        });

        return [{
          Status: 'Success',
          File: output
        }];
      })()
