site: trae-cn
name: send
description: 向 Trae IDE 发送提示文本
domain: localhost
strategy: ui
browser: true

args:
  text:
    positional: true
    type: string
    required: true
    description: 要发送的文本内容

columns: [Status, InjectedText]

pipeline:
  - evaluate: |
      (async () => {
        var textToInsert = ${{ args.text | json }};

        var editor = document.querySelector('.inputarea.monaco-mouse-cursor-text, textarea.inputarea');
        if (!editor) return [{ Status: 'Error', InjectedText: '未找到输入元素' }];

        editor.focus();

        var nativeInputValueSetter = Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype, 'value').set;
        nativeInputValueSetter.call(editor, textToInsert);
        editor.dispatchEvent(new Event('input', { bubbles: true }));
        await new Promise(function(r) { setTimeout(r, 500); });

        editor.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter', code: 'Enter', keyCode: 13, bubbles: true }));
        await new Promise(function(r) { setTimeout(r, 1000); });

        return [{ Status: 'Success', InjectedText: textToInsert }];
      })()
